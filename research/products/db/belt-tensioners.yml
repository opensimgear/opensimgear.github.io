opensource:
  - project_name: Belt-Tensioner-Robot-Servo
    description: Belt Tensioner Robot Servo. SimHub active belt tensioner using hobby
      servos. Older working DIY project; GitHub metadata showed last update in 2022.
      Active sim-racing harness tensioner controlled from SimHub.
    maker: StuyoP
    component_category: belt-tensioners
    component_sub_category: Belt controller
    license: GPL-3.0
    project_url: https://github.com/StuyoP/Belt-Tensioner-Robot-Servo
    picture_url: https://resize.thingiverse.com/?url=https://cdn.thingiverse.com/assets/b4/30/d4/0a/fb/IMG_2242.JPG&w=628&h=472&fit=contain&cbg=white&n=-1
  - project_name: Flag Ghost Belt Tensioner
    description: Flag Ghost Belt Tensioner. Compact AASD/90ST servo active harness
      tensioner. Community DIY design referenced by Thanos, Motion4Sim, and OverTake
      posts. Plans appear to be distributed privately or sold by FlagGhost rather than
      published as an open repository. Compact active belt design for sim racing harness
      cueing.
    maker: FlagGhost / community plan seller through Thanos Discord
    component_category: belt-tensioners
    component_sub_category: Belt tensioner
    license: Unknown; no explicit open-source license found. Plans are reported as available
      for purchase from FlagGhost.
    project_url: https://www.youtube.com/watch?v=fOlSEwAlbic
    picture_url: https://i.ytimg.com/vi/fOlSEwAlbic/maxresdefault.jpg
  - project_name: gTenxor
    description: gTenxor. SimHub plugin and Arduino/gTenxor servo controller. Public
      prototype/plugin project from 2023; small community footprint. SimHub plugin
      controls a seat belt/harness from telemetry.
    maker: BojoteX / Jesus Altuve
    component_category: belt-tensioners
    component_sub_category: Belt controller
    license: MIT, stated in README.
    project_url: https://github.com/BojoteX/gTenxor
    picture_url: https://raw.githubusercontent.com/BojoteX/gTenxor/master/images/gTenxor_hq.jpg
  - project_name: Hoernle's Belt Tensioner
    description: Hoernle Belt Tensioner. Free 80/90ST servo active harness tensioner with
      single and dual axis versions. Public community design started in June 2022;
      OverTake thread first post edited for v1.5 on 2025-11-16. Multiple community
      builds are reported. Converts simulator telemetry into harness pull for sustained
      braking and lateral-force cueing.
    maker: Hoernle / OverTake and Virtual Racing community
    component_category: belt-tensioners
    component_sub_category: Belt tensioner
    license: Free community project; explicit hardware/software license not found in
      researched sources.
    project_url: https://www.overtake.gg/threads/hoernles-belt-tensioner-detailed-build-instructions.249951/
    picture_url: https://overtake-data.community.forum/attachments/919/919714-ec2710136cbdf0106afb40b79b1f5a91.jpg?hash=PawqtXHyd6
  - project_name: Seat Belt Tensioner GT V3.0
    description: LeBois GT v3.0 Belt Tensioner. SimHub Arduino 350 W motor-and-spool DIY
      harness tensioner. Public DIY project from 2020, updated through 2026, but author
      now marks the mod not recommended due to reliability limits and points builders
      toward P1 or future V4. Budget DIY active harness tensioner for braking, ABS,
      shifting, and negative-G style cues.
    maker: Lebois Racing
    component_category: belt-tensioners
    component_sub_category: Belt controller
    license: 3D files download page states Creative Commons BY-NC-ND for distributed files.
    project_url: https://lebois-racing.com/seat-belt-tensioner-gt/
    picture_url: https://lebois-racing.com/wp-content/uploads/2020/07/sim-racing-belt-tensioner-srt-gt.jpg
  - project_name: SilentChill oDrive Seat Belt Tensioner
    description: SilentChill oDrive Belt Tensioner. ODrive dual-motor 3D printed active
      harness tensioner. Public video-documented DIY prototype from around 2023; shared
      files/configs are referenced in video notes and comments rather than a formal
      repository. 3D-printed active seat belt tensioner built around ODrive motor
      control.
    maker: SilentChill 6DOF Motion Gaming
    component_category: belt-tensioners
    component_sub_category: Belt tensioner
    license: Unknown; no explicit open-source license found for STL/config sharing.
    project_url: https://www.youtube.com/watch?v=vuurS1u4X_c
    picture_url: https://i.ytimg.com/vi/vuurS1u4X_c/maxresdefault.jpg
  - project_name: SimHub Profiles / SimHub Custom Serial documentation
    description: blekenbleu SimHub Custom Serial Profiles. SimHub custom serial
      servo-profile foundation. Public documentation/profile set; used as a base by
      multiple DIY belt projects. Documents SimHub custom serial workflows for
      Arduino/Blue Pill style devices.
    maker: blekenbleu
    component_category: belt-tensioners
    component_sub_category: Belt controller
    license: CC0-1.0 for SimHub-Profiles repository.
    project_url: https://github.com/blekenbleu/SimHub-Profiles
    picture_url: https://blekenbleu.github.io/Arduino/SimHubCustomSerial.gif
