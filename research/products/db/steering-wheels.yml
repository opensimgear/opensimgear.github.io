      panels. Mature hobby firmware with large community footprint; active repository. Configurable
      USB HID game-device controller based on cheap STM32F103C8 boards.
    maker: FreeJoy-Team
    component_category: steering-wheels
    component_sub_category: wheel-electronics
    license: GPL-3.0
    project_url: https://github.com/FreeJoy-Team/FreeJoy
    picture_url: https://raw.githubusercontent.com/FreeJoy-Team/FreeJoy/master/images/main.png
  - project_name: LY steeringWheel MeterBox STM32 FreeRTOS
    description: LY SteeringWheel MeterBox. formula-style wheel with display and SimHub support.
      Complete university Formula Student graduation project; repo and external hardware project
      available. STM32F407 steering wheel for Formula Student car and simulator use.
    maker: Nolimy
    component_category: steering-wheels
    component_sub_category: formula-wheel
    license: GPL-3.0
    project_url: https://github.com/Nolimy/steeringWheel_MeterBox_STM32_FreeRTOS
    picture_url: https://raw.githubusercontent.com/Nolimy/steeringWheel_MeterBox_STM32_FreeRTOS/main/readme%20md/simhub1.png
  - project_name: OpenSourceSimWheelESP32
    description: OpenSourceSimWheelESP32. wireless steering-wheel/button-box electronics. Active,
      documented, fully operational project with releases and extensive documentation. Open
      hardware/software for ESP32 sim-racing wheel or button box.
    maker: afpineda
    component_category: steering-wheels
    component_sub_category: wheel-electronics
    license: EUPL-1.2
    project_url: https://github.com/afpineda/OpenSourceSimWheelESP32
