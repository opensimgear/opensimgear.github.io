      complexity and modest activity. DIY sim racing wheel using Raspberry Pi Pico and AS5600
      magnetic encoder.
    maker: khui0
    component_category: steering-wheels
    component_sub_category: wheel-electronics
    license: GPL-3.0
    project_url: https://github.com/khui0/pico-wheel
