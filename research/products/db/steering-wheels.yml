opensource:
  - project_name: "FreeJoy"
    description: "FreeJoy. configurable USB HID input controller for wheels, pedals, shifters, and panels. Mature hobby firmware with large community footprint; active repository. Configurable USB HID game-device controller based on cheap STM32F103C8 boards."
    maker: "FreeJoy-Team"
    component_category: "steering-wheels"
    component_sub_category: "configurable USB HID input controller for wheels, pedals, shifters, and panels"
    license: "GPL-3.0"
    project_url: "https://github.com/FreeJoy-Team/FreeJoy"
    picture_url: "https://raw.githubusercontent.com/FreeJoy-Team/FreeJoy/master/images/main.png"
  - project_name: "LY steeringWheel MeterBox STM32 FreeRTOS"
    description: "LY SteeringWheel MeterBox. formula-style wheel with display and SimHub support. Complete university Formula Student graduation project; repo and external hardware project available. STM32F407 steering wheel for Formula Student car and simulator use."
    maker: "Nolimy"
    component_category: "steering-wheels"
    component_sub_category: "formula-style wheel with display and SimHub support"
    license: "GPL-3.0"
    project_url: "https://github.com/Nolimy/steeringWheel_MeterBox_STM32_FreeRTOS"
    picture_url: "https://raw.githubusercontent.com/Nolimy/steeringWheel_MeterBox_STM32_FreeRTOS/main/readme%20md/simhub1.png"
  - project_name: "OpenSourceSimWheelESP32"
    description: "OpenSourceSimWheelESP32. wireless steering-wheel/button-box electronics. Active, documented, fully operational project with releases and extensive documentation. Open hardware/software for ESP32 sim-racing wheel or button box."
    maker: "afpineda"
    component_category: "steering-wheels"
    component_sub_category: "wireless steering-wheel/button-box electronics"
    license: "EUPL-1.2"
    project_url: "https://github.com/afpineda/OpenSourceSimWheelESP32"
    picture_url: "https://repository-images.githubusercontent.com/489044238/1d81d5ed-5a48-4502-8079-3e7befab7929"
  - project_name: "Pico Wheel"
    description: "Pico Wheel. non-FFB 3D-printed wheel/controller. Small complete hobby project; low complexity and modest activity. DIY sim racing wheel using Raspberry Pi Pico and AS5600 magnetic encoder."
    maker: "khui0"
    component_category: "steering-wheels"
    component_sub_category: "non-FFB 3D-printed wheel/controller"
    license: "GPL-3.0"
    project_url: "https://github.com/khui0/pico-wheel"
    picture_url: "https://github.com/khui0/pico-wheel/assets/101839505/29395627-e298-49d1-adba-7828c009001b"
  - project_name: "Turn Racing DIY Wheels"
    description: "Turn Racing DIY Wheels. source-available 3D/CAD steering wheel archive. Archived community DIY wheel file collection; repo updated but license is restrictive. Archive includes multiple Turn DIY wheel projects such as 488 Challenge, 911 GT3 Cup, Fiesta WRC, GT GT3, GTE, R8 LMS, RSR-17, AMG GT3 [uncertain exact current repo coverage]."
    maker: "Turn Racing community"
    component_category: "steering-wheels"
    component_sub_category: "source-available 3D/CAD steering wheel archive"
    license: "CC BY-NC-ND 4.0; source-available but not OSI/open-hardware-compliant because commercial use and derivative sharing are restricted."
    project_url: "https://github.com/turnracing/turnracing-diy"
    picture_url: "https://simracing-pc.de/wp-content/uploads/2025/05/simracing-pc.jpg"
  - project_name: "WirelessWheel"
    description: "WirelessWheel. NRF24 wireless wheel electronics. Functional hobby project; updated but smaller and older than OpenSourceSimWheelESP32. NRF24-powered wireless steering wheel with buttons, LEDs, Nextion display, and SimHub support."
    maker: "MorGuux"
    component_category: "steering-wheels"
    component_sub_category: "NRF24 wireless wheel electronics"
    license: "GPL-3.0"
    project_url: "https://github.com/MorGuux/WirelessWheel"
    picture_url: "https://repository-images.githubusercontent.com/298696858/beb10cdf-2252-4644-bd03-47356db0214f"
