opensource:
  - project_name: AITrack
    description: AITrack. webcam AI head tracking. Mature but slower-moving; GitHub shows 15
      tags, 1.4k stars, and many open issues. 6DoF head tracking software designed to
      work alongside opentrack.
    maker: AIRLegend
    component_category: vr-and-head-tracking
    component_sub_category: Head tracking
    license: MIT
    project_url: https://github.com/AIRLegend/aitrack
    picture_url: https://opengraph.githubassets.com/6b706df3f3310e0ad786ad4d86844b33c49917c4faa245765b0b23419459cfd2/AIRLegend/aitrack
  - project_name: HadesVR
    description: HadesVR. DIY SteamVR-compatible headset/controllers. Active-ish DIY
      project; latest captured GitHub release 1.5 from 2023, with open issues and active
      docs. DIY SteamVR-compatible VR setup for tinkerers.
    maker: HadesVR
    component_category: vr-and-head-tracking
    component_sub_category: VR runtime
    license: MIT
    project_url: https://github.com/HadesVR/HadesVR
    picture_url: https://raw.githubusercontent.com/HadesVR/HadesVR/main/docs/img/Headset.png
  - project_name: Monado
    description: Monado. OpenXR runtime. Active open-source XR runtime; developer site is
      current and lists Linux, Android, and Windows development. Cross-platform
      open-source OpenXR runtime for VR/AR on Linux, Android, Windows, and other
      devices.
    maker: Monado / freedesktop.org / Collabora contributors
    component_category: vr-and-head-tracking
    component_sub_category: VR runtime
    license: Permissive open-source licenses; exact components vary by repository
    project_url: https://gitlab.freedesktop.org/monado/monado
    picture_url: https://gitlab.freedesktop.org/.within.website/x/cmd/anubis/static/img/pensive.webp?cacheBuster=v1.25.0-10-ga2a4cde
  - project_name: OpenHMD
    description: OpenHMD. open HMD driver API. Unmaintained; README says OpenHMD is not
      actively maintained and XR driver work has largely moved to Monado.
      Free/open-source API and drivers for immersive technology such as head-mounted
      displays with built-in head tracking.
    maker: OpenHMD community
    component_category: vr-and-head-tracking
    component_sub_category: VR runtime
    license: Boost Software License 1.0
    project_url: https://github.com/OpenHMD/OpenHMD
    picture_url: http://www.openhmd.net/wordpress/wp-content/uploads/2018/06/3glasses-pre.png
  - project_name: opentrack
    description: opentrack. head tracking software. Active and mature; GitHub shows latest
      release opentrack 2026.1.0 on 2025-12-31. Tracks user head rotation/position and
      relays it to games and flight simulation software.
    maker: opentrack contributors / Stanislaw Halik
    component_category: vr-and-head-tracking
    component_sub_category: VR runtime
    license: Mostly ISC, with a few proprietary dependencies noted by project
    project_url: https://github.com/opentrack/opentrack
    picture_url: https://opengraph.githubassets.com/3a141d2a0e47de2893955e811ce5c00254ff8010b4b73f296cafd407a618e01c/opentrack/opentrack
  - project_name: OpenVR Space Calibrator
    description: OpenVR Space Calibrator. mixed tracking-space calibration. Mature but old
      upstream; latest captured release v1.4 from 2022, with community forks in use
      [uncertain]. Aligns multiple SteamVR/OpenVR tracking systems so tracked devices
      from one vendor can be used with another HMD/tracking space.
    maker: pushrax
    component_category: vr-and-head-tracking
    component_sub_category: VR calibration
    license: MIT
    project_url: https://github.com/pushrax/OpenVR-SpaceCalibrator
    picture_url: https://wiki.vronlinux.org/logo.webp
  - project_name: OSVR Core
    description: OSVR Core. VR/AR software platform. Dormant legacy platform; developer
      portal generated in 2018 and latest captured OSVR-Core release from 2015.
      Open-source software platform for discovery, configuration, and operation of VR/AR
      devices and peripherals.
    maker: OSVR / Sensics and contributors
    component_category: vr-and-head-tracking
    component_sub_category: VR runtime
    license: Apache-2.0
    project_url: https://github.com/OSVR/OSVR-Core
    picture_url: https://github.com/fluidicon.png
  - project_name: Project North Star
    description: Project North Star. open-source AR headset. Open-sourced reference
      hardware; no GitHub releases, community docs remain available. Open-source files
      for Leap Motion's Project North Star AR headset.
    maker: Leap Motion / Ultraleap community
    component_category: vr-and-head-tracking
    component_sub_category: AR headset
    license: GPL-3.0 in GitHub sidebar; project blog/docs mention Apache license for
      original package [uncertain conflict]
    project_url: https://github.com/leapmotion/ProjectNorthStar
    picture_url: https://raw.githubusercontent.com/leapmotion/ProjectNorthStar/master/Mechanical/imgs/hero-north-star-release.jpg
  - project_name: Relativty
    description: Relativty. open-source VR headset. Dormant but influential DIY VR headset
      project; README includes a May 2023 recommended build note. Fully open-source
      hardware, software, and firmware VR headset project with SteamVR support.
    maker: Relativty / Maxim xyz and Gabriel Combe
    component_category: vr-and-head-tracking
    component_sub_category: VR headset
    license: GPL-3.0
    project_url: https://github.com/relativty/Relativty
    picture_url: https://raw.githubusercontent.com/relativty/Relativty/master/ressources/img/open.jpg
