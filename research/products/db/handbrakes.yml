opensource:
  - project_name: Analog E-Brake
    description: AM-STUDIO Analog E-Brake. Arduino analog handbrake. Popular older YouTube/GitHub
      project; minimal repo documentation. Analog USB handbrake firmware/sketch for sim racing.
    maker: AM-STUDIO
    component_category: handbrakes
    component_sub_category: handbrake-firmware
    license: CC BY-NC-ND 4.0; source-available but not OSI/open-hardware-compliant because commercial
      use and derivative sharing are restricted.
    project_url: https://github.com/AM-STUDIO/Analog-E-Brake
    picture_url: https://i.ytimg.com/vi/kv0FTpRLFMY/maxresdefault.jpg
  - project_name: Analog USB Handbrake
    description: Analog USB Handbrake. conversion kit for real/drift handbrake lever. Complete small
      conversion guide; older repo, no explicit license. Converts cheap real-car drift/race
      handbrake into analog USB handbrake for racing sims.
    maker: obsoletenerd
    component_category: handbrakes
    component_sub_category: handbrake-conversion
    license: No repository license found [uncertain].
    project_url: https://github.com/obsoletenerd/analog-usb-handbrake
    picture_url: https://raw.githubusercontent.com/obsoletenerd/analog-usb-handbrake/master/Meta/Analog-USB-Handbrake-Lever.jpg
  - project_name: Chinese SimRacing 14Bit Handbrake Custom Firmware
    description: Chinese SimRacing 14Bit Handbrake Custom Firmware. replacement firmware for generic
      Hall-sensor handbrakes. Focused firmware mod for common Chinese 12/14-bit handbrakes; active
      enough and practical. Replacement Arduino sketch for generic Chinese "14 Bit" handbrakes using
      Pro Micro and Hall sensor.
    maker: Daniel Korgel / Dak0r
    component_category: handbrakes
    component_sub_category: handbrake-firmware
    license: Apache-2.0
    project_url: https://github.com/Dak0r/Chinese-SimRacing-14Bit-Handbrake-Custom-Firmware-Arduino-Sketch
    picture_url: https://raw.githubusercontent.com/Dak0r/Chinese-SimRacing-14Bit-Handbrake-Custom-Firmware-Arduino-Sketch/master/14bit%20v3%20images/pcb_v3_top_anot.jpg
  - project_name: force_sensing_handbrake
    description: Force Sensing Handbrake. load-cell force-sensing handbrake. Complete documented project
      with bilingual README, CAD/STL, firmware, and Thingiverse mirror; older but still useful.
      Converts handbrake force into USB joystick axis using load cell rather than displacement.
    maker: zhyma
    component_category: handbrakes
    component_sub_category: analog-handbrake
    license: CC-BY-4.0
    project_url: https://github.com/zhyma/force_sensing_handbrake
    picture_url: https://raw.githubusercontent.com/zhyma/force_sensing_handbrake/master/img/comics.jpg
  - project_name: OpenHandbrake
    description: OpenHandbrake. embedded controller and hardware handbrake project. Very early/simple
      repository; source exists but documentation is minimal. Embedded controller and hardware
      project for a simple, non-FFB sim racing handbrake.
    maker: BiggiePete
    component_category: handbrakes
    component_sub_category: handbrake-firmware
    license: MIT
    project_url: https://github.com/BiggiePete/OpenHandbrake
    picture_url: https://github.com/fluidicon.png
