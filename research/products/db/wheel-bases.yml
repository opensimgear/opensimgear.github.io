opensource:
  - project_name: AFFBWheel
    description: AFFBWheel. Arduino force-feedback wheel controller. Active-ish hobby
      firmware; 160+ stars and ongoing issue activity, but still DIY experimental.
      Arduino ATmega32U4 wheel controller with force feedback.
    maker: vsulako
    component_category: wheel-bases
    component_sub_category: FFB controller
    license: MIT
    project_url: https://github.com/vsulako/AFFBWheel
    picture_url: https://raw.githubusercontent.com/vsulako/AFFBWheel/master/images/firmware-instructions/install_arduino_lib_en.png
  - project_name: Arduino-FFB-wheel
    description: Arduino-FFB-wheel. Arduino DirectInput FFB wheel firmware. Active hobby
      firmware with releases; repository shows ongoing updates but no explicit license.
      Standalone DirectInput USB joystick with force feedback on ATmega32U4 boards.
    maker: ranenbg, based on BRWheel by Fernando Igor and others
    component_category: wheel-bases
    component_sub_category: FFB controller
    license: No repository license found [uncertain].
    project_url: https://github.com/ranenbg/Arduino-FFB-wheel
    picture_url: https://raw.githubusercontent.com/ranenbg/Arduino-FFB-wheel/master/brWheel_my/wirings/Firmware-v250%20pinout.png
  - project_name: DIY-DirectDrive
    description: DIY-DirectDrive. ODrive-based direct-drive wheel software. Source
      available, small historic Python project; site and repo still reachable but low
      recent activity. Python software for creating a direct-drive force-feedback wheel
      with an ODrive Robotics board and industrial servo motor.
    maker: Jan Balke
    component_category: wheel-bases
    component_sub_category: FFB controller
    license: GPL-3.0
    project_url: https://github.com/JanBalke420/DIY-DirectDrive
    picture_url: https://jan-balke.com/img/ODrive.jpg
  - project_name: OpenFFBoard
    description: OpenFFBoard. modular force-feedback controller and motor-driver ecosystem.
      Active ongoing project with current firmware, hardware, wiki, and configurator
      repositories. Universal USB HID force-feedback interface for DIY wheels,
      joysticks, and other simulator controls.
    maker: Yannick Richter / Ultrawipf
    component_category: wheel-bases
    component_sub_category: FFB controller
    license: MIT for main firmware; MIT top-level hardware license with possible subfolder
      exceptions; GPL-3.0 for configurator.
    project_url: https://github.com/Ultrawipf/OpenFFBoard
    picture_url: https://raw.githubusercontent.com/wiki/Ultrawipf/OpenFFBoard/img/ffboard_firmware_overview.png
  - project_name: OpenSimWheel / OSW
    description: OpenSimWheel / OSW. legacy direct-drive servo wheel-base architecture.
      Historic DIY direct-drive reference; largely superseded by Simucube-era commercial
      products and newer open stacks such as OpenFFBoard. Direct-drive wheel using
      off-the-shelf industrial servo drive, servo motor, STM32F4DISCOVERY controller,
      and wheel shaft adapter.
    maker: Early Virtual-Racing community; tutorial by Martin Ascher / Ascher Racing
    component_category: wheel-bases
    component_sub_category: FFB controller
    license: Original tutorial calls it an open-source software project, but exact license
      and firmware availability are unclear in current archives [uncertain].
    project_url: "null"
    picture_url: https://raw.githubusercontent.com/wiki/Ultrawipf/OpenFFBoard/img/odrive/OD_DFU_Jumper.jpg
