opensource:
  - project_name: OpenHarrier SJU-4A Ejection Seat
    description: OpenHarrier SJU-4A Ejection Seat. flight replica seat. Public build
      instructions and FreeCAD model available through OpenHarrier; Martin-Baker Mk10
      variant not yet available per project page. Replica Stencel SJU-4/A seat for AV-8B
      Harrier cockpit builds.
    maker: OpenHarrier
    component_category: seats-and-ergonomics
    component_sub_category: Flight seat
    license: GPL-3.0 in AV8B-NA repository
    project_url: https://github.com/OpenHarrier/AV8B-NA/tree/main/EjectionSeats/SJU-4A
    picture_url: https://openharrier.org/wp-content/uploads/2024/06/sju-4a-freecad-2024-06-14-070153-1.png
  - project_name: OpenHornet SJU-17 Ejection Seat
    description: OpenHornet SJU-17 Ejection Seat. flight replica seat. Released as part of
      OpenHornet hardware package; release notes mention SJU-17 full release package and
      later DXF updates. Replica NACES/SJU-17-style ejection seat package for an F/A-18
      cockpit build.
    maker: OpenHornet / jrsteensen and contributors
    component_category: seats-and-ergonomics
    component_sub_category: Flight seat
    license: Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International through
      OpenHornet project
    project_url: https://github.com/jrsteensen/OpenHornet
    picture_url: https://raw.githubusercontent.com/jrsteensen/OpenHornet/master/images/Glareshields.2019.10.21.PNG
