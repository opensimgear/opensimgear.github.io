      instructions and FreeCAD model available through OpenHarrier; Martin-Baker Mk10
      variant not yet available per project page. Replica Stencel SJU-4/A seat for AV-8B
      Harrier cockpit builds.
    maker: OpenHarrier
    component_category: seats-and-ergonomics
    component_sub_category: flight-seat
    license: GPL-3.0 in AV8B-NA repository
    project_url: https://github.com/OpenHarrier/AV8B-NA/tree/main/EjectionSeats/SJU-4A
