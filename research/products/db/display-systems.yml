opensource:
  - project_name: MapMap
    description: MapMap. projection mapping software. Mature but low/reduced activity; public
      repo has 10 tags and many open issues. Free/open-source video mapping software for
      Windows, macOS, and Linux.
    maker: MapMap team
    component_category: display-systems
    component_sub_category: projection-mapping
    license: GPL-3.0
    project_url: https://github.com/mapmapteam/mapmap
    picture_url: https://mapmapteam.github.io/documentation_images/toggle_display_controls.png
  - project_name: ofxPiMapper
    description: ofxPiMapper. embedded projection mapping. Mature openFrameworks add-on; active
      enough to have recent GitHub Actions notes, but Raspberry Pi disk image support lags
      newer Pi hardware. Projection mapping add-on for openFrameworks, designed to run on
      Raspberry Pi.
    maker: Krisjanis Rijnieks / kr15h
    component_category: display-systems
    component_sub_category: projection-mapping
    license: MIT-style or open-source license in repository LICENSE.md [uncertain exact SPDX]
    project_url: https://github.com/kr15h/ofxPiMapper
    picture_url: https://ofxpimapper.com/assets/images/ofxpimapper-ogimage.jpg
  - project_name: ofxProjectorBlend
    description: ofxProjectorBlend. projector edge blending library. Older openFrameworks
      add-on; no published releases and limited recent maintenance. openFrameworks add-on
      that splits an application into two or more projector outputs.
    maker: Flightphase / James George / Jeff Crouse fork lineage
    component_category: display-systems
    component_sub_category: projector
    license: MIT-style permissive license text in README
    project_url: https://github.com/Flightphase/ofxProjectorBlend
    picture_url: https://opengraph.githubassets.com/64f1add62be39ec1cb6072eeb3354547531f8bc67d7d9d780c160a4e4defbe93/Flightphase/ofxProjectorBlend
  - project_name: OpenGC
    description: OpenGC. glass cockpit instrument display software. Dormant; home page last
      updated April 24, 2006. Multi-platform, multi-simulator C++ toolkit for simulated
      flightdeck glass cockpit displays.
    maker: Damion Shelton / OpenGC project
    component_category: display-systems
    component_sub_category: display-software
    license: Example application GPL; libraries BSD-style per project home page
    project_url: https://sourceforge.net/projects/opengc/
    picture_url: https://a.fsdn.com/con/img/hi-text.png
  - project_name: ProjectionMapping
    description: pkurth ProjectionMapping. large-scale projection mapping system.
      Research/prototype code; no GitHub releases, 1 contributor, Windows/D3D12 focused.
      Open-source projection mapping system for many projectors illuminating one or more
      tracked target objects.
    maker: Philipp Kurth
    component_category: display-systems
    component_sub_category: projection-mapping
    license: MIT
    project_url: https://github.com/pkurth/ProjectionMapping
    picture_url: https://raw.githubusercontent.com/pkurth/ProjectionMapping/master/assets/samples/teaser.jpg
  - project_name: Splash
    description: Splash. projection warping and blending software. Active-ish open-source
      project; GitHub mirror says development moved to GitLab; latest captured release
      0.10.8 from 2024. Modular multi-projector video-mapping software.
    maker: Emmanuel Durand / SAT Metalab / Lab148 contributors
    component_category: display-systems
    component_sub_category: projection-mapping
    license: GPL-3.0-or-later
    project_url: https://gitlab.com/splashmapper/splash
    picture_url: https://opengraph.githubassets.com/60b9272bd7988eb798f2b9d14291472661efb35ca0f9e38d4d804964dc115875/paperManu/splash
