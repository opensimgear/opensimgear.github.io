  - project_name: DIY Aluminium Profile Sim Rig
    description: DIY Aluminium Profile Sim Rig. aluminum profile cockpit. Personal build
      design; README includes cockpit updates through 2025, but project is still a
      shared plan rather than a maintained product line. Compact 40 mm aluminum
      extrusion cockpit inspired by Sim-Lab GT1 Evo and P1-X geometry.
    maker: djpr1me
    component_category: rigs-and-cockpits
    component_sub_category: Aluminum cockpit
    license: CC0-1.0
    project_url: https://github.com/djpr1me/Sim-Rig-Cockpit
    picture_url: https://raw.githubusercontent.com/djpr1me/Sim-Rig-Cockpit/main/pr1me_simrig_rotated_pedals.png
  - project_name: MobiFlight panel design templates
    description: MobiFlight Panel Design Templates. home cockpit panel templates. Work in
      progress; latest GitHub release captured from 2021, but broader MobiFlight
      ecosystem remains active. Open SVG cockpit-panel design template based on
      Dzus/MS25212C-style aircraft panel dimensions.
    maker: MobiFlight community / Tuomas Kuosmanen and contributors
    component_category: rigs-and-cockpits
    component_sub_category: Cockpit plans
    license: GPL-3.0
    project_url: https://github.com/MobiFlight/mobiflight-templates
    picture_url: https://user-images.githubusercontent.com/2587818/119951371-8b725600-bfa4-11eb-8002-0fe23cdbc718.png
