opensource:
  - project_name: GT7 Shaker for Linux
    description: GT7 Shaker for Linux. Gran Turismo 7 bass-shaker telemetry converter. Active personal
      project; README states it is still under development and bugs are expected. Reads GT7 network
      telemetry from PS4/PS5 and converts it to low-latency audio for bass shakers.
    maker: Helskov
    component_category: tactile-feedback
    component_sub_category: haptics-software
    license: GPL-3.0
    project_url: https://github.com/Helskov/GT7-Shaker-for-linux
    picture_url: https://raw.githubusercontent.com/Helskov/GT7-Shaker-for-linux/main/src/gt_shaker/assets/welcome.png
  - project_name: Monocoque
    description: Monocoque. open telemetry-to-haptics and device manager. Active Linux-first project;
      GitHub metadata showed updates in April 2026. Converts sim telemetry into bass-shaker,
      simwind, simlight, tachometer, wheel/pedal, and serial outputs.
    maker: Spacefreak18
    component_category: tactile-feedback
    component_sub_category: haptics-software
    license: GPL-3.0
    project_url: https://github.com/Spacefreak18/monocoque
    picture_url: https://opengraph.githubassets.com/4ee1e2043804c0cbe8122bd6154eed8cc6d4445a26c821c82b57c3050ccb0098/Spacefreak18/monocoque
  - project_name: SpaceMonkey
    description: SpaceMonkey. telemetry provider for motion, wind, shakers, and LEDs. Released Windows
      telemetry provider with broad game support and ongoing release notes through 2020s. Adds
      telemetry output for games with weak or missing native telemetry.
    maker: PHARTGAMES
    component_category: tactile-feedback
    component_sub_category: haptics-software
    license: MIT
    project_url: https://github.com/PHARTGAMES/SpaceMonkey
    picture_url: https://raw.githubusercontent.com/PHARTGAMES/SpaceMonkey/main/Documentation/MainInterface.png
