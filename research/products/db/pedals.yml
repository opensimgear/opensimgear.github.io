  - project_name: CNCDan Sim Pedals
    description: CNCDan Sim Pedals. laser-cut and 3D-printed load-cell/hall pedal set.
      Active open-hardware pedal design; repo recently updated and moderately popular.
      Interchangeable pedal bodies for any 1/2/3 pedal combination.
    maker: dmcke5 / CNCDan
    component_category: pedals
    component_sub_category: Load-cell pedals
    license: CERN-OHL-S-2.0
    project_url: https://github.com/dmcke5/SimPedals
    picture_url: https://raw.githubusercontent.com/dmcke5/SimPedals/main/title.png
  - project_name: DIY Load Cell Sim Racing Pedals
    description: DIY Load Cell Sim Racing Pedals. Arduino load-cell pedal firmware. Small
      firmware/reference project; active enough but not a full mechanical pedal design.
      Arduino scripts read two load cells and expose brake/throttle as Windows joystick
      inputs.
    maker: tbattz
    component_category: pedals
    component_sub_category: Pedal firmware
    license: GPL-3.0
    project_url: https://github.com/tbattz/DIYLoadCellSimRacingPedals
    picture_url: https://opengraph.githubassets.com/aadf3a5f300964cd095338bcec06cd234fddac9d598d5bb231b57b47ad56539f/MHeironimus/ArduinoJoystickLibrary
  - project_name: DIY Sim Racing FFB Pedal
    description: DIY Sim Racing FFB Pedal. active force-feedback pedal. Large active DIY
      project with firmware, SimHub plugin, mechanical design, PCB repositories, wiki,
      Discord, and build automation. Servo-driven active pedal using linear rail and
      high-power actuator behavior.
    maker: ChrGri and contributors
    component_category: pedals
    component_sub_category: FFB pedal
    license: CC BY-NC-SA 4.0; source-available/noncommercial, not OSI-open because of NC
      restriction.
    project_url: https://github.com/ChrGri/DIY-Sim-Racing-FFB-Pedal
    picture_url: https://opengraph.githubassets.com/8c049ed9f198c665b9b2bdd1f6aff196cf9bbc9a563d5f9a2b7cbc15fb9903ae/ChrGri/DIY-Sim-Racing-FFB-Pedal
