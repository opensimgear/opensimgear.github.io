name: Deploy to GitHub Pages
on:
  # Trigger the workflow every time you push to the `main` branch
  # Using a different branch name? Replace `main` with your branch’s name
  push:
    branches: [main]
    paths:
      - src/**
      - public/**
      - astro.config.mjs
      - package.json
      - playwright.config.ts
      - svelte.config.js
      - tailwind.config.mjs
      - tsconfig.json
      - e2e/**
      - .github/workflows/ci.yml
      - pnpm-lock.yaml
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:
# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  deployments: read
  pages: write
  id-token: write
jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Test, Build, Upload
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        uses: ./.github/actions/astro-build
  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
  e2e:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E smoke test
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.page_url }}
        run: pnpm e2e
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
  deployment-changelog:
    needs: deploy
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.publish-metadata.outputs.changelog }}
      current_sha: ${{ steps.publish-metadata.outputs.current_sha }}
      has_changelog: ${{ steps.publish-metadata.outputs.has_changelog }}
      previous_sha: ${{ steps.publish-metadata.outputs.previous_sha }}
      release_tag: ${{ steps.publish-metadata.outputs.release_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate Copilot token
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          if [ -z "${COPILOT_GITHUB_TOKEN}" ]; then
            echo 'Missing `COPILOT_GITHUB_TOKEN` secret. Create a fine-grained PAT with `Copilot Requests` permission.' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
      - name: Install Copilot CLI
        run: npm install -g @github/copilot
      - name: Resolve previous github-pages deployment
        id: previous-deployment
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_SHA: ${{ github.sha }}
          DEPLOYMENT_ENVIRONMENT: github-pages
        run: |
          set -euo pipefail

          previous_sha=''
          current_deployment_seen='false'

          while IFS=$'\t' read -r deployment_id deployment_sha; do
            success_count="$(
              gh api "/repos/${GITHUB_REPOSITORY}/deployments/${deployment_id}/statuses?per_page=20" \
                --jq 'map(select(.state == "success")) | length'
            )"

            if [ "${success_count}" = '0' ]; then
              continue
            fi

            if [ "${current_deployment_seen}" = 'false' ] && [ "${deployment_sha}" = "${CURRENT_SHA}" ]; then
              current_deployment_seen='true'
              continue
            fi

            previous_sha="${deployment_sha}"
            break
          done < <(gh api "/repos/${GITHUB_REPOSITORY}/deployments?environment=${DEPLOYMENT_ENVIRONMENT}&per_page=20" --jq '.[] | [.id, .sha] | @tsv')

          echo "previous_sha=${previous_sha}" >> "$GITHUB_OUTPUT"
      - name: Generate deployment changelog
        if: ${{ steps.previous-deployment.outputs.previous_sha != '' }}
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          PREVIOUS_SHA: ${{ steps.previous-deployment.outputs.previous_sha }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Deployment changelog
          Comparing \`${PREVIOUS_SHA}\` to \`${CURRENT_SHA}\`.

          EOF

          copilot --model gpt-5-mini -s -p "Review git history in range ${PREVIOUS_SHA}..${CURRENT_SHA} for this repository and return only markdown for the changelog.

          Output format:
          ## Features
          - bullet points

          ## Fixes
          - bullet points

          Rules:
          - Focus only on portal or website user-facing features, meaningful portal improvements, and bugs fixed since the last github-pages deployment.
          - Group related commits into higher-level bullets.
          - Exclude CI changes, workflow changes, build scripts, deployment plumbing, tests, docs-only changes, refactors, dependency bumps, and any internal maintenance work.
          - If the deployment does not include a portal or website user-visible feature or fix, write '- None.' for both sections.
          - If no items fit a section, write '- None.'
          - Output only the final markdown like in the output format description, with no prose before or after it.
          - Use git commands only for evidence." --allow-tool='shell(git:*)' --no-ask-user > deployment-changelog.md

          cat deployment-changelog.md >> "$GITHUB_STEP_SUMMARY"
      - name: Handle missing previous deployment
        if: ${{ steps.previous-deployment.outputs.previous_sha == '' }}
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Deployment changelog
          No previous successful `github-pages` deployment found. Skipping changelog generation.
          EOF
      - name: Publish changelog outputs
        id: publish-metadata
        env:
          CURRENT_SHA: ${{ github.sha }}
          PREVIOUS_SHA: ${{ steps.previous-deployment.outputs.previous_sha }}
        run: |
          set -euo pipefail

          release_tag="website-deploy-${CURRENT_SHA::12}"
          has_changelog='false'
          changelog_delimiter="CHANGELOG_EOF_$(date +%s)"

          if [ -f deployment-changelog.md ]; then
            meaningful_item_count="$(
              awk '/^- / && $0 != "- None." { count++ } END { print count + 0 }' deployment-changelog.md
            )"

            if [ "${meaningful_item_count}" -gt 0 ]; then
              has_changelog='true'
            fi
          fi

          echo "current_sha=${CURRENT_SHA}" >> "$GITHUB_OUTPUT"
          echo "previous_sha=${PREVIOUS_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "has_changelog=${has_changelog}" >> "$GITHUB_OUTPUT"

          {
            echo "changelog<<${changelog_delimiter}"

            if [ "${has_changelog}" = 'true' ]; then
              cat deployment-changelog.md
            else
              echo '## Deployment changelog'
              echo 'No meaningful feature or fix entries found. Skipping release and Discord notification.'
            fi

            echo "${changelog_delimiter}"
          } >> "$GITHUB_OUTPUT"
      - name: Upload deployment changelog artifact
        if: ${{ steps.previous-deployment.outputs.previous_sha != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: deployment-changelog
          path: deployment-changelog.md
  create-release:
    needs:
      - deployment-changelog
      - e2e
    if: ${{ needs.deployment-changelog.outputs.has_changelog == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_url: ${{ steps.create-release.outputs.release_url }}
      release_name: ${{ steps.create-release.outputs.release_name }}
    steps:
      - name: Create or update release
        id: create-release
        env:
          CHANGELOG: ${{ needs.deployment-changelog.outputs.changelog }}
          CURRENT_SHA: ${{ needs.deployment-changelog.outputs.current_sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.deployment-changelog.outputs.release_tag }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --notes "${CHANGELOG}" --latest=false
          else
            gh release create "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --target "${CURRENT_SHA}" --notes "${CHANGELOG}" --latest=false
          fi

          echo "release_name=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          release_url="$(gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json url --jq '.url')"
          echo "release_url=${release_url}" >> "$GITHUB_OUTPUT"
          echo "Created or updated release: ${release_url}" >> "$GITHUB_STEP_SUMMARY"
  notify-discord:
    needs:
      - deployment-changelog
      - create-release
    if: ${{ needs.deployment-changelog.outputs.has_changelog == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check Discord webhook configuration
        id: discord-webhook-check
        env:
          DISCORD_DEPLOYMENT_CHANGELOG_WEBHOOK: ${{ secrets.DISCORD_DEPLOYMENT_CHANGELOG_WEBHOOK }}
        run: |
          if [ -n "${DISCORD_DEPLOYMENT_CHANGELOG_WEBHOOK}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi
      - name: GitHub release to Discord
        if: ${{ steps.discord-webhook-check.outputs.configured == 'true' }}
        uses: SethCohen/github-releases-to-discord@v1.20.0
        with:
          webhook_url: ${{ secrets.DISCORD_DEPLOYMENT_CHANGELOG_WEBHOOK }}
          username: OpenSimGear Releases
          footer_title: Deployment changelog
          reduce_headings: true
          release_name: ${{ needs.create-release.outputs.release_name }}
          release_body: ${{ needs.deployment-changelog.outputs.changelog }}
          release_html_url: ${{ needs.create-release.outputs.release_url }}
      - name: Handle missing Discord webhook
        if: ${{ steps.discord-webhook-check.outputs.configured != 'true' }}
        run: |
          echo 'Discord webhook secret `DISCORD_DEPLOYMENT_CHANGELOG_WEBHOOK` not configured. Skipping Discord notification.' >> "$GITHUB_STEP_SUMMARY"
